services:
  mysql:
    image: mysql:8.4
    container_name: cleanmediasapi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: cleanmediasapi
      MYSQL_USER: ${DATABASE_USERNAME}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - cleanmediasapi-mysql-data:/var/lib/mysql
    networks:
      - cleanmediasapi-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  cleanmediasapi:
    image: gustavodamassa/clean-medias-api:${IMAGE_TAG:-latest}
    container_name: cleanmediasapi
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/cleanmediasapi
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_PUBLIC_KEY_CONTENT: ${JWT_PUBLIC_KEY_CONTENT}
      JWT_PRIVATE_KEY_CONTENT: ${JWT_PRIVATE_KEY_CONTENT}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cleanmediasapi-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: cleanmediasapi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      cleanmediasapi:
        condition: service_healthy
    networks:
      - cleanmediasapi-network

  watchtower:
    image: containrrr/watchtower
    container_name: cleanmediasapi-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 cleanmediasapi
    networks:
      - cleanmediasapi-network

volumes:
  cleanmediasapi-mysql-data:

networks:
  cleanmediasapi-network:
