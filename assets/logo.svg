<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">

  <!-- Background -->
  <rect width="400" height="280" fill="#000000" rx="10"/>

  <!-- Clean Architecture concentric rings -->
  <circle cx="200" cy="126" r="92"  fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.32"/>
  <circle cx="200" cy="126" r="63"  fill="none" stroke="#ffffff" stroke-width="1.6" opacity="0.50"/>
  <circle cx="200" cy="126" r="36"  fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.72"/>

  <!-- Stylized M symbol (based on original MediasAPI logo) -->
  <path d="M 160 158 L 168 94 L 200 145 L 232 94 L 240 158"
        fill="none" stroke="#ffffff" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Horizontal bar -->
  <line x1="158" y1="165" x2="242" y2="165"
        stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- n symbol -->
  <text x="200" y="196"
        font-family="'Courier New', Courier, monospace"
        font-size="22" fill="#ffffff" text-anchor="middle">n</text>


</svg>
