services:
  mysql:
    image: mysql:8.4
    container_name: cleanmediasapi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cleanmediasapi
      MYSQL_USER: cleanmediasapi
      MYSQL_PASSWORD: cleanmediasapi
    ports:
      - "3306:3306"
    volumes:
      - cleanmediasapi-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cleanmediasapi-mysql-data:
