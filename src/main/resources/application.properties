spring.application.name=cleanMediasAPI

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.placeholder-replacement=false

# JWT (RSA — chaves em base64 puro, sem headers PEM)
jwt.public-key=${JWT_PUBLIC_KEY_CONTENT}
jwt.private-key=${JWT_PRIVATE_KEY_CONTENT}
jwt.expiration-seconds=16000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
server.forward-headers-strategy=NATIVE

# Logging
logging.level.org.springframework.web=INFO
logging.level.br.com.gustavohenrique.cleanmediasapi=INFO
